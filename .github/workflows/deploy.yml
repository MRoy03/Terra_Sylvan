name: Deploy Terra Sylvan to GitHub Pages

on:
  push:
    branches: [ main ]        # auto-deploy when you push to main
  workflow_dispatch:           # also allows manual trigger from GitHub UI

# Grant the workflow permission to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          # ── Base path ──────────────────────────────────────────────────────
          # For a PROJECT site  (username.github.io/repo-name)  leave as-is.
          # For a USER/ORG site (username.github.io)             set to ''
          #   by adding NEXT_PUBLIC_BASE_PATH="" as a repository secret.
          NEXT_PUBLIC_BASE_PATH: ${{ secrets.NEXT_PUBLIC_BASE_PATH || format('/{0}', github.event.repository.name) }}

          # ── Firebase (required) ────────────────────────────────────────────
          NEXT_PUBLIC_FIREBASE_API_KEY:                ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:            ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID:             ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:         ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:    ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID:                 ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_DATABASE_URL:           ${{ secrets.NEXT_PUBLIC_FIREBASE_DATABASE_URL }}

          # ── Cloudinary (optional — needed for image/video uploads) ─────────
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME:           ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
          NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET:        ${{ secrets.NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET }}

        run: npm run build
        # Output goes to ./out/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload static files
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
