<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Terra Sylvan</title>
  <!--
    GitHub Pages SPA routing fix.
    When GitHub Pages serves a 404 for any path (e.g. /dashboard, /chat),
    this page encodes the original path in a query string and redirects to
    the root index, where the inline restoration script picks it up.

    pathSegmentsToKeep = 1  →  project site  (username.github.io/repo-name/)
    pathSegmentsToKeep = 0  →  user/org site (username.github.io/)
  -->
  <script>
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
